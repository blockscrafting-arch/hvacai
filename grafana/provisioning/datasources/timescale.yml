apiVersion: 1

# Старый datasource без uid ломает панели с ссылкой uid: tsdb-hvac — удаляем и создаём заново при старте Grafana
deleteDatasources:
  - name: TimescaleDB
    orgId: 1

datasources:
  - name: TimescaleDB
    uid: tsdb-hvac
    type: postgres
    url: timescaledb:5432
    # Имя БД дублируем: в актуальных Grafana для Postgres «default database» берётся из jsonData.database (см. оф. пример provisioning)
    database: hvac
    user: postgres
    secureJsonData:
      # Пароль из env контейнера grafana (см. docker-compose)
      password: $POSTGRES_PASSWORD
    jsonData:
      database: hvac
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: true
