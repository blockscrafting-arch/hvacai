apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    url: timescaledb:5432
    # Явные значения: Grafana не всегда подставляет ${VAR} из env в provisioning (пустой database → ошибка в панелях)
    database: hvac
    user: postgres
    secureJsonData:
      # Пароль из env контейнера grafana (см. docker-compose)
      password: $POSTGRES_PASSWORD
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: true
